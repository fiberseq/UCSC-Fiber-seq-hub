name: Deploy hub to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "hub/**"
      - "pixi.toml"
      - "pixi.lock"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1

      # Deploy exactly what's committed under hub/ -- validate.yml already
      # rebuilt it fresh from the live sheet and confirmed it's up to date
      # on this same push. Rebuilding again here would re-fetch the sheet a
      # second time and could deploy content that was never actually
      # validated if the sheet changed in between.
      #
      # TODO: switch to `pixi run hubCheck -udcDir=.cache/udc ...` (re-fetches
      # every bigWig/bigBed, ~3-5 min) before submitting to UCSC. Fast
      # structure-only check for now while iterating -- build_hub.py's own
      # URL check still catches dead links.
      - name: hubCheck gate (fail the deploy on a broken hub)
        run: |
          python3 -m http.server 8791 --directory hub &
          sleep 1
          pixi run hubCheck -noTracks http://localhost:8791/hub.txt

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: hub

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
